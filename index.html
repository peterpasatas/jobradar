<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobRadar — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  :root { --bg:#07070f;--surface:#0f0f1a;--border:#1e1e2e;--accent:#00e5a0;--text:#e8e8f0;--muted:#555570; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,160,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,0.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:100%;max-width:400px;position:relative;z-index:1;}
  .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;margin-bottom:6px;}
  .logo span{color:var(--accent);}
  .tagline{font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:36px;}
  .tabs{display:flex;margin-bottom:24px;border-bottom:1px solid var(--border);}
  .tab{flex:1;padding:10px;background:none;border:none;color:var(--muted);font-family:'DM Mono',monospace;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s;text-align:center;}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .field input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;padding:11px 14px;outline:none;transition:border-color 0.2s;}
  .field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,160,0.08);}
  .btn{width:100%;padding:13px;background:var(--accent);color:#07070f;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;margin-top:6px;transition:all 0.2s;}
  .btn:hover{background:#00ffb3;transform:translateY(-1px);}
  .btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
  .msg{margin-top:14px;font-size:12px;text-align:center;min-height:18px;}
  .msg.err{color:#f87171;}.msg.ok{color:var(--accent);}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Job<span>Radar</span></div>
  <div class="tagline">AI-powered job matching</div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('login',this)">Sign In</button>
    <button class="tab" onclick="switchTab('signup',this)">Sign Up</button>
  </div>
  <div id="loginForm">
    <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="you@example.com"></div>
    <div class="field"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••••"></div>
    <button class="btn" onclick="login()">Sign In</button>
  </div>
  <div id="signupForm" style="display:none">
    <div class="field"><label>Email</label><input type="email" id="signupEmail" placeholder="you@example.com"></div>
    <div class="field"><label>Password</label><input type="password" id="signupPassword" placeholder="Min 6 characters"></div>
    <button class="btn" onclick="signup()">Create Account</button>
  </div>
  <div class="msg" id="msg"></div>
</div>
<script>
  const sb = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON);
  sb.auth.getSession().then(({data})=>{ if(data.session) window.location.href='results.html'; });

  function switchTab(tab,btn){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('loginForm').style.display = tab==='login' ? '' : 'none';
    document.getElementById('signupForm').style.display = tab==='signup' ? '' : 'none';
    setMsg('','');
  }
  function setMsg(text,type){ const el=document.getElementById('msg'); el.textContent=text; el.className=`msg ${type}`; }

  async function login(){
    const email=document.getElementById('loginEmail').value.trim();
    const password=document.getElementById('loginPassword').value;
    if(!email||!password){setMsg('Please fill in all fields.','err');return;}
    const btn=document.querySelector('#loginForm .btn');
    btn.disabled=true; btn.textContent='Signing in…';
    const {error}=await sb.auth.signInWithPassword({email,password});
    if(error){setMsg(error.message,'err');btn.disabled=false;btn.textContent='Sign In';}
    else window.location.href='results.html';
  }

  async function signup(){
    const email=document.getElementById('signupEmail').value.trim();
    const password=document.getElementById('signupPassword').value;
    if(!email||!password){setMsg('Please fill in all fields.','err');return;}
    if(password.length<6){setMsg('Password must be at least 6 characters.','err');return;}
    const btn=document.querySelector('#signupForm .btn');
    btn.disabled=true; btn.textContent='Creating account…';
    const {error}=await sb.auth.signUp({email,password});
    if(error){setMsg(error.message,'err');btn.disabled=false;btn.textContent='Create Account';}
    else{setMsg('Account created! You can now sign in.','ok');btn.disabled=false;btn.textContent='Create Account';switchTab('login',document.querySelectorAll('.tab')[0]);}
  }

  document.addEventListener('keydown',e=>{ if(e.key!=='Enter')return; document.getElementById('loginForm').style.display!=='none'?login():signup(); });
</script>
</body>
</html>
